name: Build Kernel Module

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Install aarch64 cross compiler
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu make flex bison libssl-dev

      - name: Download kernel source 5.10.252
        run: |
          # 更换为官方全球边缘加速镜像，GitHub 服务器下载此源速度极快
          wget -q --timeout=60 --tries=5 https://mirrors.edge.kernel.org/pub/linux/kernel/v5.x/linux-5.10.252.tar.xz
          
          # 修复了解压与目录版本号不一致的 Bug
          tar -xf linux-5.10.252.tar.xz
          cd linux-5.10.252
          make ARCH=arm64 defconfig
          make ARCH=arm64 modules_prepare

      - name: Compile LKM .ko module
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KERNELDIR=$PWD/linux-5.10.252 M=$PWD modules

      - name: Upload compiled ko artifact
        uses: actions/upload-artifact@v5
        with:
          name: cpu_spoof_ko
          path: ./*.ko
